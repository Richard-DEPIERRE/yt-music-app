name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel in-flight runs on new pushes to the same PR/branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # required so the coverage comment step can post/update on PRs

jobs:
  backend:
    name: backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.4.30"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test (with coverage)
        run: uv run pytest -v --cov --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Render coverage as markdown
        if: always()
        id: coverage-md
        run: |
          {
            echo "## Backend coverage"
            echo ""
            uv run coverage report --format=markdown
          } > coverage-summary.md
          # Echo to job summary too (visible on push-to-main runs that have no PR).
          cat coverage-summary.md >> "$GITHUB_STEP_SUMMARY"
          # Expose the file path so later steps can read it.
          echo "path=backend/coverage-summary.md" >> "$GITHUB_OUTPUT"

      - name: Comment coverage on PR
        if: always() && github.event_name == 'pull_request'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: backend-coverage   # makes the comment "sticky": one per PR, updated in place
          path: ${{ steps.coverage-md.outputs.path }}

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14
