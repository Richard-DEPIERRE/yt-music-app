services:
  pot-provider:
    build:
      context: ./pot-provider
    container_name: pot-provider
    restart: unless-stopped
    networks:
      - ytmusic_internal
    healthcheck:
      # /health returns 404 on 1.3.1; /ping returns 200 {"server_uptime":...,"version":"1.3.1"}
      # Image has no curl/wget; use node (always present) for the HTTP check.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:4416/ping', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3

  yt-music-api:
    build:
      context: ./backend
    container_name: yt-music-api
    restart: unless-stopped
    depends_on:
      pot-provider:
        condition: service_healthy
    environment:
      YT_HEADERS_PATH: /secrets/yt_headers.json
      POT_PROVIDER_URL: http://pot-provider:4416
      AUTH_HEALTH_INTERVAL: "900"
    volumes:
      - ./secrets:/secrets:rw
    ports:
      - "8001:8000"   # bound to all interfaces so cloudflared can reach via the LAN IP (8000 is in use by another homelab service)
    networks:
      - ytmusic_internal
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/v1/health\")'"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  ytmusic_internal:
    driver: bridge
